<!DOCTYPE html>

<html>
  <head>
    <title>Transcript Viewer</title>
    <link rel="stylesheet" href="./styles.css">
    <!-- <link rel="icon" href="./assets/favicon.ico"> -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Assistant">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="./scripts.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <header>
      <h1>Transcript Viewer</h1>
    </header>
    <main>
      <h2>Podcast Episode #1</h2>
      <div class="player-box">
        <!-- <video></video> -->
        <div class="player">
          <img src="./assets/example1.jpg" class="cover">
          <div class="captions" id="captions"></div>
        </div>
        <div class="player-controls">
          <label class="icon-btn" id="toggleCaptions" title="Toggle Captions">
            <input type="checkbox">
            <i class="material-symbols-outlined"></i>
          </label>
          <label class="icon-btn" id="toggleCover" title="Toggle Cover">
            <input type="checkbox" checked>
            <i class="material-symbols-outlined"></i>
          </label>
        </div>
        <audio id="audio" src="./data/example1.mp3" controls>
          <track
            default
            kind="captions"
            srclang="en"
            label="English"
            src="./data/example1.vtt"
            id="track">
        </audio>
        <!-- <span>test</span> -->
      </div>
      <div class="layout-controls">
        <label class="icon-btn" id="collapseTranscript" title="Maximize Player">
          <input type="checkbox">
          <i class="material-symbols-outlined"></i>
        </label>
        <label class="icon-btn" id="collapsePlayer" title="Maximize Transcript">
          <input type="checkbox">
          <i class="material-symbols-outlined"></i>
        </label>
        <label class="icon-btn" id="playPause" title="Play/Pause">
          <input type="checkbox">
          <i class="material-symbols-outlined"></i>
        </label>
      </div>
      <div class="peakmeter" id="peakmeter"></div>
      <div class="transcript-box">
        <header>
          <h3>Transcript</h3>
          <label class="icon-btn" id="syncTranscript" title="Sync Transcript">
            <input type="checkbox">
            <i class="material-symbols-outlined"></i>
          </label>
          <label class="icon-btn" id="monospace" title="Use Monospace Font">
            <input type="checkbox">
            <i class="material-symbols-outlined"></i>
          </label>
          <button class="icon-btn" id="printTranscript" onclick="window.print()" title="Print Transcript">
            <i class="material-symbols-outlined"></i>
          </button>
        </header>
        <section id="transcript"></section>
      </div>
    </main>
  </body>
</html>
