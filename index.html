<!DOCTYPE html>

<html data-action="pen">
  <head>
    <title>Transcript Viewer</title>
    <link rel="stylesheet" href="./styles.css">
    <!-- <link rel="icon" href="./assets/favicon.ico"> -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Assistant">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="./scripts.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>
  <body>
    <header>
      <h1>Transcript Viewer</h1>
    </header>
    <main>
      <h2>Podcast Episode #1</h2>
      <div class="player-box">
        <!-- <video></video> -->
        <div class="player"></div>
        <audio src="./data/example1.mp3" controls>
          <track
            default
            kind="captions"
            srclang="en"
            label="English"
            src="./data/example1.vtt"
            id="track">
        </audio>
      </div>
      <div class="buttons">
        <div class="button">
          <input type="checkbox" id="collapseTranscript">
          <i class="material-symbols-outlined">right_panel_close</i>
        </div>
        <div class="button">
          <input type="checkbox" id="collapsePlayer">
          <i class="material-symbols-outlined">left_panel_close</i>
        </div>
      </div>
      <div class="volume" id="volume"></div>
      <section class="transcript">
        <header>
          <h3>Transcript</h3>
          <button class="button" onclick="window.print()">
            <i class="material-symbols-outlined">print</i>
          </button>
        </header>
        <span id="transcript">
        </span>
      </section>
    </main>
  </body>
</html>
